<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sign Up - Interactive Fitness</title>

  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="sign-up.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body class="sign-up">
  
  <nav class="navbar">
    <div class="navbar-bg"></div>
    <div class="nav-title">Interactive Fitness</div>
  </nav>

  <main class="hero">
    <form id="signupForm" class="login-box">
      <h1>Create Account</h1>

      <input type="text" name="displayName" placeholder="Full name" class="input-field" required>
      <input type="email" name="email" placeholder="Email" class="input-field" required>
      <input type="password" name="password" placeholder="Password" class="input-field" required>

      <select name="accountType" class="input-field" required>
        <option value="">Account type</option>
        <option value="personal">Personal</option>
        <option value="professional">Professional</option>
      </select>

      <button type="submit" class="btn-modern">Create Account</button>

      <div class="links">
        <a href="index.html">Already have an account?</a>
      </div>
    </form>
  </main>

  <script type="module" src="sign-up.js"></script>
</body>
