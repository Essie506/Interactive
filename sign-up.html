<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Fitness</title>

  <link rel="stylesheet" href="Base2.css" />
  <link rel="stylesheet" href="Index.css" />
  <link rel="stylesheet" href="sign-up.css" />

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="sign-up-page">
  <main class="index-hero">
    <section class="index-login-panel sign-up-panel">
      <div class="index-login-inner">
        <header class="index-login-header">
          <h1 class="index-login-title">Interactive</h1>
          <p class="index-login-tagline">Create your account.</p>
        </header>

        <form id="signupForm" class="index-login-form sign-up-form">
          <div class="index-field">
            <input
              type="text"
              id="displayName"
              name="displayName"
              placeholder="Full name"
              class="input-field"
              autocomplete="name"
              required
            />
          </div>

          <div class="index-field">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              class="input-field"
              autocomplete="email"
              required
            />
          </div>

          <div class="index-field">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              class="input-field"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="index-field">
            <select
              id="accountType"
              name="accountType"
              class="input-field sign-up-select"
              required
            >
              <option value="">Account type</option>
              <option value="personal">Personal</option>
              <option value="professional">Professional</option>
            </select>
          </div>

          <button type="submit" class="index-login-btn" id="signupBtn">
            Create Account
          </button>
        </form>

        <div class="index-login-links">
          <a href="index.html">Already have an account?</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2025 Interactive Fitness — All Rights Reserved
  </footer>

  <script type="module" src="sign-up.js"></script>
</body>
</html>
