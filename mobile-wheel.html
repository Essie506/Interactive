  <div class="mobile-wheel">
      <div class="wheel-wrapper">
        <div class="pointer"></div>

        <div class="wheel" id="wheel">
          <div class="segment">
            <i class="fa-solid fa-spa" data-page="yoga.html" data-label="Yoga"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-dumbbell" data-page="strength.html" data-label="Strength"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-heart-pulse" data-page="cardio.html" data-label="Cardio"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-bolt" data-page="hiit.html" data-label="HIIT"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-person" data-page="pilates.html" data-label="Pilates"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-arrows-up-down-left-right" data-page="mobility.html" data-label="Mobility"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-circle-dot" data-page="core.html" data-label="Core"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-scale-balanced" data-page="balance.html" data-label="Balance"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-hand-holding-heart" data-page="recovery.html" data-label="Recovery"></i>
          </div>
          <div class="segment">
            <i class="fa-solid fa-child-reaching" data-page="stretch.html" data-label="Stretch"></i>
          </div>
        </div>

        <button type="button" class="hub" id="spinBtn">SPIN</button>

        <div class="wheel-result" id="wheelResult">Spin the wheel</div>

        <div class="wheel-actions">
          <button type="button" id="acceptBtn" class="wheel-btn">Go</button>
          <button type="button" id="rejectBtn" class="wheel-btn">No, not that one</button>
        </div>
      </div>
    </div>
