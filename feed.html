  <button class="top-action-btn search-toggle" aria-label="Search">

  </button>
</header>

<nav class="menu">
  <ul>

    <li>
      <a href="home.html" class="menu-link-modern">Home</a>
    </li>

    <li>
      <a href="feed.html" class="menu-link-modern">Feed</a>
    </li>

    <li class="has-submenu">

      <a href="#" class="menu-link-modern">Profile</a>

      <ul class="submenu">
        <li><a href="view-profile.html">View Profile</a></li>

<!-- MAIN FEED -->
<main class="feed-page">

  <h1>Community Feed</h1>

  <!-- post composer -->
  <div class="post-box">

    <input
      type="text"
      placeholder="Share your workout..."
    >

    <button class="btn-modern">
      Post
    </button>

  </div>

  <!-- feed container -->
  <div id="feed"></div>


</main>


<script src="feed.js"></script>

  <script>
document.addEventListener("DOMContentLoaded", () => {
  const menuToggle = document.querySelector(".menu-toggle");
  const menu = document.querySelector(".menu");

  if (!menuToggle || !menu) return;

  menuToggle.addEventListener("click", () => {
    menuToggle.classList.toggle("active");
    menu.classList.toggle("open");
  });

  const parentLinks = document.querySelectorAll(".has-submenu > a");

  parentLinks.forEach(link => {
    link.addEventListener("click", (e) => {
      e.preventDefault();

      const parent = link.parentElement;
      const isOpen = parent.classList.contains("open");

      document
        .querySelectorAll(".has-submenu")
        .forEach(p => p.classList.remove("open"));

      if (!isOpen) {
        parent.classList.add("open");
      }
    });
  });
});
</script>

</body>
</html>
