 <!-- FILTER DRAWER -->

    <div class="directory-filter-overlay" id="directoryFilterOverlay"></div>
  <aside class="directory-filter-menu" id="directoryFilterMenu" aria-hidden="true">


<header class="directory-filter-header">

  <div class="directory-filter-title">

    <i class="fa-solid fa-pen"></i>

    <h2>Edit Profile</h2>

  </div>


  <div class="profile-editor-tabs">

    <button
      type="button"
      class="profile-editor-tab active"
      data-editor-tab="profile"
    >
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </button>


    <button
      type="button"
      class="profile-editor-tab"
      data-editor-tab="services"
    >
      <i class="fa-solid fa-dumbbell"></i>
      <span>Services</span>
    </button>


    <button
      type="button"
      class="profile-editor-tab"
      data-editor-tab="verification"
    >
      <i class="fa-solid fa-circle-check"></i>
      <span>Verification</span>
    </button>

  </div>


  <button
    type="button"
    class="messages-back"
    id="directoryFilterClose"
  >
    <i class="fa-solid fa-arrow-right"></i>
  </button>

</header>
    
    <div class="directory-filter-body">      


  <!-- BUSINESS LOCATION -->

  <section
    class="directory-filter-section"
  >

 <div
      class="directory-filter-static-heading"
    >

      <span class="b1">
        Business location
      </span>

    </div>

    <div
      class="directory-filter-static-content"
    >

      <label
        class="directory-location-search"
      >

        <i class="fa-solid fa-location-dot"></i>

        <input
          type="text"
          class="directory-location-input"
          placeholder="Search town, city or postcode"
        />

      </label>

    </div>

  </section>

  <!-- BIO -->

  <section
    class="directory-filter-section"
  >

    <div
      class="directory-filter-static-heading"
    >

      <span class="b1">
        Bio
      </span>

    </div>

    <div
      class="directory-filter-static-content"
    >

      <textarea
        class="profile-editor-bio"
        placeholder="Tell people about yourself..."
      ></textarea>

    </div>

  </section>



      
<section class="directory-filter-section directory-filter-panel">

  <button class="directory-filter-section-toggle" type="button">
      <span class="toggle-inner">
        <span class ="b1">Services</span>
    <i class="fa-solid fa-chevron-down"></i>
      </span>
  </button>
    <div class="directory-filter-section-content">

        <div class="directory-pill-row">
        <button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="Classes">Classes</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="Doctor-referrals">Doctor referrals</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="home-workouts">Home workouts</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="Les-Mills">Les-Mills</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="nutrition">Nutrition</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="personal-training">Personal training</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="supplements">Supplements</button>
<button class="directory-filter-pill" type="button" data-filter-group="services" data-filter-value="tasters">Taster-sessions</button>
        </div>
    </div>
</section>
  


<!-- PROFESSIONAL TYPE -->
<section class="directory-filter-section directory-filter-panel">
  <button class="directory-filter-section-toggle" type="button">
      <span class="toggle-inner">
    <span class="b1">Professional type</span>
    <i class="fa-solid fa-chevron-down"></i>
      </span>
  </button>

  <div class="directory-filter-section-content">
    <div class="directory-pill-row">
   <button class="directory-filter-pill" data-filter-group="professional-type" data-filter-value="class-instructor">Class instructor</button>
<button class="directory-filter-pill" data-filter-group="professional-type" data-filter-value="nutrition-coach">Nutrition coach</button>
<button class="directory-filter-pill" data-filter-group="professional-type" data-filter-value="personal-trainer">Personal trainer</button>
<button class="directory-filter-pill" data-filter-group="professional-type" data-filter-value="physiotherapist">Physiotherapist</button>
<button class="directory-filter-pill" data-filter-group="professional-type" data-filter-value="pilates">Pilates</button>
<button class="directory-filter-pill" data-filter-group="professional-type" data-filter-value="yoga">Yoga Instructor</button>
    </div>
  </div>
</section>

<!-- SPECIALISMS -->
<section class="directory-filter-section directory-filter-panel">
  <button class="directory-filter-section-toggle">
      <span class="toggle-inner">
    <span class="b1">Specialisms</span>
    <i class="fa-solid fa-chevron-down"></i>
      </span>
  </button>

  <div class="directory-filter-section-content">
    <div class="directory-pill-row">
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="beginners">Beginners</button>
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="dr-referrals">Doctor referrals</button>
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="fat-loss">Fat loss</button>
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="mobility">Mobility</button>
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="rehab">Rehabilitation</button>
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="strength">Strength</button>
<button class="directory-filter-pill" data-filter-group="specialism" data-filter-value="youth-nutrition">Youth nutrition (11+)</button>
    </div>
  </div>
</section>

<!-- SESSION TYPE -->
<section class="directory-filter-section directory-filter-panel">
  <button class="directory-filter-section-toggle">
      <span class="toggle-inner">
    <span class="b1">Session type</span>
    <i class="fa-solid fa-chevron-down"></i>
      </span>
  </button>

  <div class="directory-filter-section-content">
    <div class="directory-pill-row">
      <button class="directory-filter-pill" data-filter-group="session" data-filter-value="1to1">1-to-1</button>
      <button class="directory-filter-pill" data-filter-group="session" data-filter-value="group">Group</button>
      <button class="directory-filter-pill" data-filter-group="session" data-filter-value="online">Online</button>
      <button class="directory-filter-pill" data-filter-group="session" data-filter-value="outdoor">Outdoor</button>
    </div>
  </div>
</section>


    <div class="directory-filter-feet">
      <button class="directory-filter-reset" id="directoryFilterReset" type="button">
        Reset Filters
      </button>

      <button class="directory-filter-apply" id="directoryFilterApply" type="button">
        Close &amp; Apply filters
      </button>
    </div>
  </div>
      </div>
  </aside>
