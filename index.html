<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fitness</title>
    <!-- Link to your CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Background Logo -->
    <div class="background-logo">
        <img src="images/logo.png" alt="Interactive Fitness Logo">
    </div>

    <!-- Header / Navigation -->
    <header class="navbar">
        <!-- Optional gradient + logo overlay -->
        <div class="navbar-bg"></div>
        <!-- Hamburger Menu (for mobile) -->
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <!-- Menu Panel -->
        <nav class="menu" id="menuPanel">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="has-submenu">
                    <a href="#">Programs</a>
                    <ul class="submenu">
                        <li><a href="#">Strength</a></li>
                        <li><a href="#">Cardio</a></li>
                        <li><a href="#">Yoga</a></li>
                    </ul>
                </li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content / Hero -->
    <main class="hero">
        <h1 class="tagline">Move. Train. Connect.</h1>

        <div class="btn-modern">
            <input type="email" placeholder="Email" class="input-field">
            <input type="password" placeholder="Password" class="input-field">

            <button onclick="window.location.href='home.html'">
                Login
            </button>

            <div class="links">
                <a href="#">Create Account</a> |
                <a href="#">Forgot Password?</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        © 2025 Interactive Fitness — All Rights Reserved
    </footer>

    <!-- Hamburger Menu Script -->
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuPanel = document.getElementById('menuPanel');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuPanel.classList.toggle('open');
        });
    </script>
    
</body>
</html>
