<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Fitness</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="index">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-bg"></div>
    <div class="nav-title">Interactive Fitness</div>
  </nav>

  <!-- Main -->
  <main class="hero">
    <h1 class="tagline">Move. Train. Connect.</h1>

    <div class="login-box">
      <input type="email" placeholder="Email" class="input-field">
      <input type="password" placeholder="Password" class="input-field">

      <button type="button" class="btn-modern btn-login" id="loginBtn">
        Connect!
      </button>

      <div class="links">
        <a href="#">Create Account</a>
        <a href="#">Forgot Password?</a>
      </div>
    </div>
  </main>

  <footer>
    © 2025 Interactive Fitness — All Rights Reserved
  </footer>
<script src="index.js"></script>

</body>
</html>
