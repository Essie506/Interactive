<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Fitness</title>

  <link rel="stylesheet" href="Base2.css" />
  <link rel="stylesheet" href="Index.css" />
</head>

<body class="index-page">



<main class="index-hero">

  
  <section class="index-login-panel">
    <div class="index-login-inner">

      <!-- Title -->
      <h1 class="index-login-title">Interactive Fitness</h1>

      <!-- Tagline -->
      <p class="index-login-tagline">Move. Train. Connect.</p>

      <!-- Login box -->
      <form class="index-login-form" id="loginForm">
        <div class="index-field">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email"
            class="input-field"
            autocomplete="email"
          />
        </div>

        <div class="index-field">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            class="input-field"
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="index-login-btn" id="loginBtn" disabled>
          Log in
        </button>
      </form>

      <!-- Social (optional) -->
      <div class="index-social">
        <div class="index-divider">
          <span>or</span>
        </div>

        <button type="button" class="social-btn facebook">
          <i class="fa-brands fa-facebook-f"></i>
          Continue with Facebook
        </button>

        <button type="button" class="social-btn google">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </button>
      </div>

      <!-- Bottom link -->
      <div class="index-login-links">
        <span>Don’t have an account?</span>
        <a href="sign-up.html">Sign up</a>
      </div>

    </div>
  </section>
</main>
