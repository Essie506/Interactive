<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Fitness</title>

  <link rel="stylesheet" href="Base2.css" />
  <link rel="stylesheet" href="Index.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600&display=swap" rel="stylesheet">
</head>

<body class="index-page">

    <header class="index-login-header">
  <div class="brand-badge" aria-hidden="true">IF</div>
  <h1 class="index-login-title">Interactive Fitness</h1>
  <p class="index-login-tagline">Move. Train. Connect.</p>
</header>

  <main class="index-hero">
    
    <section class="index-login-panel">
      <div class="index-login-inner">
        <header class="index-login-header">
          <p class="index-login-tagline">Move. Train. Connect.</p>
        </header>

        <form class="index-login-form" id="loginForm">
          <div class="index-field">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              class="input-field"
              autocomplete="email"
            />
          </div>

          <div class="index-field">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              class="input-field"
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="index-login-btn" id="loginBtn" aria-label="Log in" disabled>
            Log in
          </button>
        </form>

        <div class="index-login-links">
          <a href="sign-up.html">Create Account</a>
          <a href="#">Forgot Password?</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2025 Interactive Fitness — All Rights Reserved
  </footer>

  <script src="index.js"></script>
</body>
</html>
